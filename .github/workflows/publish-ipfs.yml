name: Deploy Website to Yeti Grid

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  ENS_NAME: dorion.eth
  APP_ID: website
  VISIBILITY: public
  R2_BUCKET: yeti-grid

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Astro
        run: pnpm build

      - name: Package website
        run: |
          tar -C dist -czf website.tar.gz .

      - name: Install IPFS CLI
        run: |
          KUBO_VERSION="v0.35.0"
          curl -L "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" -o kubo.tar.gz
          tar -xzf kubo.tar.gz
          sudo bash kubo/install.sh

      - name: Compute artifact CID
        run: |
          ipfs init

          ARTIFACT_CID=$(ipfs add \
            --cid-version=1 \
            --raw-leaves=true \
            --only-hash \
            -q website.tar.gz)

          echo "ARTIFACT_CID=$ARTIFACT_CID" >> "$GITHUB_ENV"
          echo "Artifact CID: $ARTIFACT_CID"

      - name: Configure R2 credentials
        run: |
          mkdir -p ~/.aws

          cat > ~/.aws/credentials <<EOF
          [default]
          aws_access_key_id=${{ secrets.R2_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.R2_SECRET_ACCESS_KEY }}
          EOF

          cat > ~/.aws/config <<EOF
          [default]
          region=auto
          output=json
          EOF

      - name: Upload artifact to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          OBJECT_KEY="deployments/${APP_ID}/${GITHUB_SHA}/website.tar.gz"
          echo "OBJECT_KEY=$OBJECT_KEY" >> "$GITHUB_ENV"

          aws s3 cp website.tar.gz \
            "s3://${R2_BUCKET}/${OBJECT_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Create presigned artifact URL
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          ARTIFACT_URL=$(aws s3 presign \
            "s3://${R2_BUCKET}/${OBJECT_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --expires-in 900)

          echo "ARTIFACT_URL=$ARTIFACT_URL" >> "$GITHUB_ENV"

      - name: Create deploy payload
        run: |
          TIMESTAMP=$(date +%s)
          NONCE="${GITHUB_RUN_ID}-${GITHUB_SHA}"

          jq -n \
            --arg type "website" \
            --arg ens_name "$ENS_NAME" \
            --arg app_id "$APP_ID" \
            --arg artifact_url "$ARTIFACT_URL" \
            --arg artifact_cid "$ARTIFACT_CID" \
            --arg visibility "$VISIBILITY" \
            --arg nonce "$NONCE" \
            --argjson timestamp "$TIMESTAMP" \
            '{
              type: $type,
              ens_name: $ens_name,
              app_id: $app_id,
              artifact_url: $artifact_url,
              artifact_cid: $artifact_cid,
              visibility: $visibility,
              env: [],
              nonce: $nonce,
              timestamp: $timestamp
            }' > deploy-payload.json

      - name: Install signing dependency
        run: pnpm add -D ethers@latest

      - name: Sign deploy payload
        env:
          DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const { Wallet } = require("ethers");

          const payload = JSON.parse(fs.readFileSync("deploy-payload.json", "utf8"));

          if (Array.isArray(payload.env)) {
            payload.env.sort((a, b) => a.name.localeCompare(b.name));
          }

          const message = JSON.stringify(payload);
          const wallet = new Wallet(process.env.DEPLOY_PRIVATE_KEY);

          async function main() {
            const signature = await wallet.signMessage(message);

            fs.writeFileSync(
              "signed-deploy-payload.json",
              JSON.stringify({ ...payload, signature })
            );

            console.log("Deploy signer:", wallet.address);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Deploy website to Yeti Grid
        env:
          DEPLOY_URL: ${{ secrets.YETI_GRID_DEPLOY_URL }}
        run: |
          curl -f -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            --data @signed-deploy-payload.json

      - name: Summary
        run: |
          echo "## Yeti Grid Website Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact CID: \`${ARTIFACT_CID}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- R2 Object: \`${OBJECT_KEY}\`" >> "$GITHUB_STEP_SUMMARY"