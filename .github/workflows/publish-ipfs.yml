name: Deploy Website to Yeti Grid

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  ENS_NAME: dorion.eth
  APP_ID: website
  VISIBILITY: public

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Astro
        run: pnpm build

      - name: Install IPFS CLI
        run: |
          KUBO_VERSION="v0.35.0"
          curl -L "https://dist.ipfs.tech/kubo/${KUBO_VERSION}/kubo_${KUBO_VERSION}_linux-amd64.tar.gz" -o kubo.tar.gz
          tar -xzf kubo.tar.gz
          sudo bash kubo/install.sh

      - name: Init IPFS
        run: |
          ipfs init
          ipfs daemon > /tmp/ipfs.log 2>&1 &
          sleep 5

      - name: Generate CID
        id: ipfs
        run: |
          CID=$(ipfs add -r --cid-version=1 -Q dist)
          echo "cid=$CID" >> "$GITHUB_OUTPUT"
          echo "CID: $CID"

      - name: Create deploy payload
        run: |
          TIMESTAMP=$(date +%s)
          NONCE="${GITHUB_RUN_ID}-${GITHUB_SHA}"

          jq -n \
            --arg type "website" \
            --arg ens_name "$ENS_NAME" \
            --arg app_id "$APP_ID" \
            --arg artifact_url "https://ipfs.io/ipfs/${{ steps.ipfs.outputs.cid }}" \
            --arg artifact_cid "${{ steps.ipfs.outputs.cid }}" \
            --arg visibility "$VISIBILITY" \
            --arg nonce "$NONCE" \
            --argjson timestamp "$TIMESTAMP" \
            '{
              type: $type,
              ens_name: $ens_name,
              app_id: $app_id,
              artifact_url: $artifact_url,
              artifact_cid: $artifact_cid,
              visibility: $visibility,
              env: [],
              nonce: $nonce,
              timestamp: $timestamp
            }' > deploy-payload.json

      - name: Sign deploy payload
        env:
          DEPLOY_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        run: |
          npm install ethers@latest

          node <<'EOF'
          const fs = require("fs");
          const { Wallet } = require("ethers");

          const payload = JSON.parse(fs.readFileSync("deploy-payload.json", "utf8"));

          if (Array.isArray(payload.env)) {
            payload.env.sort((a, b) => a.name.localeCompare(b.name));
          }

          const message = JSON.stringify(payload);
          const wallet = new Wallet(process.env.DEPLOY_PRIVATE_KEY);

          async function main() {
            const signature = await wallet.signMessage(message);

            fs.writeFileSync(
              "signed-deploy-payload.json",
              JSON.stringify({ ...payload, signature })
            );

            console.log("Deploy signer:", wallet.address);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Deploy website to Yeti Grid
        env:
          DEPLOY_URL: ${{ secrets.YETI_GRID_DEPLOY_URL }}
        run: |
          curl -f -X POST "$DEPLOY_URL" \
            -H "Content-Type: application/json" \
            --data @signed-deploy-payload.json

      - name: Summary
        run: |
          echo "## Yeti Grid Website Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- CID: \`${{ steps.ipfs.outputs.cid }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- IPFS Gateway: https://ipfs.io/ipfs/${{ steps.ipfs.outputs.cid }}" >> "$GITHUB_STEP_SUMMARY"